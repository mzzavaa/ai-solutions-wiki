<!DOCTYPE html>
<html lang="{{ .Site.LanguageCode | default "en" }}" data-theme="light">
<head>
  {{ partial "head.html" . }}
</head>
<body>
  {{ partial "nav.html" . }}
  <main id="main-content">
    {{ block "main" . }}{{ end }}
  </main>
  {{ partial "footer.html" . }}

  <script src="{{ "pagefind/pagefind-ui.js" | relURL }}"></script>
  <script>
    window.addEventListener('DOMContentLoaded', function() {
      const params = new URLSearchParams(window.location.search);
      const initialQuery = params.get('q') || '';

      const mainSearch = new PagefindUI({
        element: "#search",
        showSubResults: true,
        showImages: false,
        showFilters: true,
        baseUrl: "{{ "" | relURL }}"
      });

      if (document.getElementById('hero-search')) {
        new PagefindUI({
          element: "#hero-search",
          showSubResults: false,
          showImages: false,
          showFilters: false,
          baseUrl: "{{ "" | relURL }}"
        });
      }

      // Restore query from URL
      if (initialQuery) {
        const input = document.querySelector('#search input[type=text]');
        if (input) {
          input.value = initialQuery;
          input.dispatchEvent(new Event('input', { bubbles: true }));
        }
      }

      // Sync search query to URL params for bookmarkable filtered searches
      document.addEventListener('input', function(e) {
        if (e.target.closest('#search') && e.target.type === 'text') {
          const url = new URL(window.location);
          const val = e.target.value.trim();
          if (val) {
            url.searchParams.set('q', val);
          } else {
            url.searchParams.delete('q');
          }
          window.history.replaceState({}, '', url);
        }
      });
    });
  </script>
  <script>
    // Dark mode toggle
    const toggle = document.getElementById('theme-toggle');
    const html = document.documentElement;
    const stored = localStorage.getItem('theme');
    if (stored) html.setAttribute('data-theme', stored);

    toggle && toggle.addEventListener('click', () => {
      const current = html.getAttribute('data-theme');
      const next = current === 'dark' ? 'light' : 'dark';
      html.setAttribute('data-theme', next);
      localStorage.setItem('theme', next);
    });

    // Active nav link
    const currentPath = window.location.pathname;
    document.querySelectorAll('.nav-dropdown a, .mobile-nav-links a, .nav-direct-link').forEach(link => {
      const href = link.getAttribute('href');
      if (href && href !== '/' && currentPath.startsWith(href)) {
        link.classList.add('active');
        const group = link.closest('.nav-group');
        if (group) {
          const btn = group.querySelector('.nav-group-btn');
          if (btn) btn.classList.add('active');
        }
      }
    });

    // Desktop dropdown toggle (click for keyboard/touch)
    document.querySelectorAll('.nav-group-btn').forEach(btn => {
      btn.addEventListener('click', (e) => {
        e.stopPropagation();
        const group = btn.closest('.nav-group');
        const isOpen = group.classList.contains('open');
        document.querySelectorAll('.nav-group.open').forEach(g => {
          g.classList.remove('open');
          g.querySelector('.nav-group-btn').setAttribute('aria-expanded', 'false');
        });
        if (!isOpen) {
          group.classList.add('open');
          btn.setAttribute('aria-expanded', 'true');
        }
      });
    });

    document.addEventListener('click', () => {
      document.querySelectorAll('.nav-group.open').forEach(g => {
        g.classList.remove('open');
        g.querySelector('.nav-group-btn').setAttribute('aria-expanded', 'false');
      });
    });

    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') {
        document.querySelectorAll('.nav-group.open').forEach(g => {
          g.classList.remove('open');
          g.querySelector('.nav-group-btn').setAttribute('aria-expanded', 'false');
        });
      }
    });

    // Mobile hamburger menu
    const hamburger = document.getElementById('hamburger');
    const mobileMenu = document.getElementById('mobile-menu');
    if (hamburger && mobileMenu) {
      hamburger.addEventListener('click', () => {
        const isOpen = hamburger.getAttribute('aria-expanded') === 'true';
        hamburger.setAttribute('aria-expanded', String(!isOpen));
        mobileMenu.setAttribute('aria-hidden', String(isOpen));
        hamburger.setAttribute('aria-label', isOpen ? 'Open menu' : 'Close menu');
      });
      mobileMenu.querySelectorAll('a').forEach(link => {
        link.addEventListener('click', () => {
          hamburger.setAttribute('aria-expanded', 'false');
          mobileMenu.setAttribute('aria-hidden', 'true');
          hamburger.setAttribute('aria-label', 'Open menu');
        });
      });
    }
  </script>
</body>
</html>
