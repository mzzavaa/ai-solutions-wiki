{{ define "main" }}
<style>
  .search-page {
    max-width: 860px;
    margin: 0 auto;
    padding: 2.5rem 1.5rem 5rem;
    min-height: 60vh;
  }

  .search-page-header {
    margin-bottom: 2rem;
  }

  .search-page-header h1 {
    font-size: 1.875rem;
    font-weight: 700;
    color: var(--text-primary);
    margin: 0 0 0.4rem;
  }

  .search-page-header p {
    color: var(--text-muted);
    font-size: 0.9375rem;
    margin: 0;
  }

  #search-page .pagefind-ui {
    max-width: 100%;
  }

  #search-page .pagefind-ui__search-input {
    font-size: 1.0625rem !important;
    padding: 0.8125rem 1.125rem !important;
    height: auto !important;
  }

  #search-page .pagefind-ui__results-container {
    margin-top: 1.5rem;
  }

  @media (max-width: 600px) {
    .search-page {
      padding: 1.5rem 1rem 3rem;
    }

    .search-page-header h1 {
      font-size: 1.375rem;
    }
  }
</style>

<div class="search-page">
  <div class="search-page-header">
    <h1>{{ .Title }}</h1>
    <p>{{ .Description }}</p>
  </div>
  <div id="search-page"></div>
</div>

<script>
  window.addEventListener('DOMContentLoaded', function() {
    new PagefindUI({
      element: '#search-page',
      showSubResults: true,
      showImages: false,
      showFilters: true,
      baseUrl: '{{ "" | relURL }}'
    });

    var params = new URLSearchParams(window.location.search);
    var q = params.get('q');
    if (q) {
      var check = setInterval(function() {
        var input = document.querySelector('#search-page input[type=text]');
        if (input) {
          clearInterval(check);
          input.value = q;
          input.dispatchEvent(new Event('input', { bubbles: true }));
        }
      }, 100);
    }

    document.addEventListener('input', function(e) {
      if (e.target.closest('#search-page') && e.target.type === 'text') {
        var url = new URL(window.location);
        var val = e.target.value.trim();
        if (val) {
          url.searchParams.set('q', val);
        } else {
          url.searchParams.delete('q');
        }
        window.history.replaceState({}, '', url);
      }
    });
  });
</script>
{{ end }}
