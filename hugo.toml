baseURL = "https://ai-solutions.wiki"
languageCode = "en-us"
title = "AI Solutions Wiki"
enableRobotsTXT = true
enableGitInfo = false
[pagination]
  pagerSize = 20

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
  [markup.highlight]
    style = "github"
    lineNos = false
    codeFences = true
  [markup.tableOfContents]
    endLevel = 3
    ordered = false
    startLevel = 2

[params]
  description = "The definitive knowledge base for AI solutions, frameworks, tools, and best practices. Practical guidance for teams building with AI."
  author = "AI Solutions Wiki"
  siteURL = "https://ai-solutions.wiki"
  workshopsURL = "https://ai-workshops.online"
  primaryColor = "#2563eb"
  accentColor = "#10b981"
  darkBg = "#0f172a"
  logoText = "AI Solutions Wiki"
  searchPlaceholder = "Search 200+ articles..."
  showReadingTime = true
  showWordCount = false
  showLastmod = true

[taxonomies]
  category = "categories"
  tag = "tags"
  industry = "industries"
  tool = "tools"

[outputs]
  home = ["HTML", "RSS", "JSON"]
  section = ["HTML", "RSS"]
  taxonomy = ["HTML"]
  term = ["HTML"]

[outputFormats]
  [outputFormats.JSON]
    mediaType = "application/json"
    baseName = "index"
    isPlainText = true

[menu]
  [[menu.main]]
    name = "Solutions"
    url = "/solutions/"
    weight = 10
  [[menu.main]]
    name = "Guides"
    url = "/guides/"
    weight = 20
  [[menu.main]]
    name = "Tools"
    url = "/tools/"
    weight = 30
  [[menu.main]]
    name = "Frameworks"
    url = "/frameworks/"
    weight = 40
  [[menu.main]]
    name = "Comparisons"
    url = "/comparisons/"
    weight = 50
  [[menu.main]]
    name = "Glossary"
    url = "/glossary/"
    weight = 60
  [[menu.main]]
    name = "About"
    url = "/about/"
    weight = 70

[related]
  includeNewer = true
  threshold = 80
  toLower = false
  [[related.indices]]
    name = "categories"
    weight = 100
  [[related.indices]]
    name = "tags"
    weight = 80
  [[related.indices]]
    name = "industries"
    weight = 60
  [[related.indices]]
    name = "tools"
    weight = 60
